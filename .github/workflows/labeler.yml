name: "Pull Request Labeler"

on:
    pull_request_target:
        types:
            - "opened"
            - "synchronize"
            - "reopened"

permissions:
    contents: "read"
    pull-requests: "write"

jobs:
    labeler:
        name: "Label"
        runs-on: "ubuntu-latest"
        timeout-minutes: 10
        steps:
            - name: "Label Pull Request"
              uses: "actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b" # v6.0.1
              with:
                  repo-token: "${{ secrets.GITHUB_TOKEN }}"
